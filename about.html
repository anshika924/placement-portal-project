<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team | Placement Portal</title>
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="stylesheet.css">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .about-wrapper {
            width: 100%;
            max-width: 1200px;
            padding: 80px 40px;
            text-align: center;
        }

        .home-btn {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 100;
        }

        .team-header {
            margin-bottom: 80px;
        }

        .team-header h1 {
            font-size: 48px;
            color: var(--accent-dark);
            margin-bottom: 15px;
            font-weight: 800;
        }

        .team-header p {
            font-size: 18px;
            color: var(--text-secondary);
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
        }

        @media (max-width: 1200px) {
            .team-grid { grid-template-columns: repeat(2, 1fr); gap: 30px; }
            .team-header h1 { font-size: 36px; }
        }

        @media (max-width: 600px) {
            .team-grid { grid-template-columns: 1fr; gap: 20px; }
            .home-btn { position: sticky; top: 20px; left: 20px; margin-bottom: 40px; }
            .about-wrapper { padding: 40px 20px; }
            .team-header { margin-bottom: 40px; }
            .team-header h1 { font-size: 28px; }
            .team-card { padding: 30px 20px; border-radius: 30px; }
        }

        .team-card {
            background: #ffffff;
            padding: 40px 20px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.02);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .team-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border-color: #10b981;
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            color: #10b981;
            box-shadow: 10px 10px 20px #d1d5d8, -10px -10px 20px #ffffff;
        }

        .team-card h3 {
            font-size: 24px;
            color: var(--accent-dark);
            margin-bottom: 8px;
        }

        .team-role {
            font-size: 14px;
            font-weight: 700;
            color: #10b981;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
            display: block;
        }

        .contact-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .contact-item {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s;
            text-decoration: none;
        }

        .contact-item:hover {
            color: #10b981;
        }

        .contact-item i {
            color: var(--accent-slate);
            font-size: 15px;
        }

        /* Responsive Fixes - Moved to Media Queries above */
    </style>
</head>
<body>
